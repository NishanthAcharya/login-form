<!DOCTYPE html>
<html lang="en">
<head>
    <title></title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            background:linear-gradient(to left,rgb(62, 10, 62),rgb(91, 91, 244));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-con{
            min-height: 60vh;
            width: 55%;
            background-color:aquamarine;
            display: flex;
            align-items: center;
            box-shadow: 0 0 16px black;

        }
        .left{
            height: 60vh;
            width: 45%;
            background-color: gray;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 2px;
            gap: 10px;
        }
        .right{
            height: 60vh;
            width: 55%;
            background-color: white;
            display: flex;
            justify-content:space-between;
            flex-direction: column;
        }
        .head1{
             margin: 5px;
             padding: 15px;
             max-width: 100%;
             
             font-family: Arial, Helvetica, sans-serif;
             text-align: center;
              
        }
        h3{
            margin: 10px;
        }
        .taking-input{
           min-height:45vh;
           width: 100%;
           /* background-color: brown; */
           display: flex;
           align-items: center;
           justify-content: center;
           flex-direction: column;
           gap: 25px;
        }
        .in{
            height: 40px;
            text-align: center;
            padding: 4px;
            border: 2px solid black;
            border-radius: 12px;
            box-shadow: 0 0 3px whitesmoke;
            width: 50%;
        }
        #btn{
            background-color: rgb(8, 8, 96);
            color: white;
            border: none;
        }
        .left-child{
            font-family: Arial, Helvetica, sans-serif;
        }
        #slogan{
            line-height: 30px;
        }
        span{
            color: blue;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="main-con">
        <div class="left">
            <h1 class="left-child">Join Us Today!</h1>
            <h3 class="left-child" id="slogan">Create Your Account To Start Managing Complaint Efficiently</h3>
        </div>
        <div class="right">
            <div class="head1">
                <h1>Create Account</h1>
                <h3>Fill in your details to get started</h3>
            </div>
            <div class="taking-input">
                 <input class="in" type="text" name="username" placeholder="username"> 
                 <input class="in" type="password" name="password" placeholder="password">
                 <select class="in" name="role" >
                    <option value="role">Role </option>
                    <option value="student">student</option>
                    <option value="lecture">lecture</option>
                    <option value="non-teaching">non-teaching</option>
                 </select>
                 <button class="in" id="btn" onclick="signup()">Create Account</button>
                 <p>Already have an account? <span><a href="login-page.html">Sign in</a></span></p>
            </div>
            
        </div>
    </div>
    <script>
function signup(){
    let username = document.querySelector('input[name="username"]').value;
    let password = document.querySelector('input[name="password"]').value;
    let role = document.querySelector('select[name="role"]').value;

    if(username === "" || password === "" || role === "role"){
        alert("Please fill all fields");
        return;
    }

    // store data
    localStorage.setItem("username", username);
    localStorage.setItem("password", password);
    localStorage.setItem("role", role);

    alert("Account Created Successfully!");

    // go to login page
    window.location.href = "login-page.html";
}
</script>
</body>
</html>
